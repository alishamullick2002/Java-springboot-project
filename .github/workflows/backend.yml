name: Backend to EC2

on:
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build Project
        run: |
          cd backend
          mvn clean package -DskipTests

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            APP_DIR=/home/ec2-user/app
            REPO_NAME=Java-springboot-project
            REPO_URL=https://github.com/alishamullick2002/Java-springboot-project.git

            mkdir -p $APP_DIR
            cd $APP_DIR

            if [ -d "$REPO_NAME/.git" ]; then
              cd $REPO_NAME
              git reset --hard
              git pull origin main
            else
              git clone $REPO_URL
              cd $REPO_NAME
            fi

            cd backend
            mvn clean package -DskipTests

            mkdir -p /var/log/app

            pkill -f datastore-0.0.7.jar || true
            sleep 5

            cd target

            nohup env \
            MYSQL_HOST=${{ secrets.DB_HOST }} \
            MYSQL_USERNAME=${{ secrets.DB_USERNAME }} \
            MYSQL_PASSWORD=${{ secrets.DB_PASSWORD }} \
            LOG_FILE_PATH=/var/log/app/datastore.log \
            java -jar datastore-0.0.7.jar --server.port=8084 \
            >/var/log/app/nohup.out 2>&1 &

            sleep 20

            echo "Java Process:"
            ps -ef | grep datastore || true

            echo "Health Check"

            for i in {1..12}
            do
              if curl -fs http://localhost:8084/actuator/health; then
                echo "Application is UP"
                exit 0
              fi
              echo "Waiting for application..."
              sleep 5
            done

            echo "Application failed to start"

            tail -100 /var/log/app/nohup.out || true

            exit 1
