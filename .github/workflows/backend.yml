name: Java Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -f backend/pom.xml clean package -DskipTests

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo su - <<'EOF'
            set -e

            PROJECT_DIR=/root/Java-springboot-project

            if [ ! -d "$PROJECT_DIR/.git" ]; then
              git clone https://github.com/alishamullick2002/Java-springboot-project.git "$PROJECT_DIR"
            fi

            cd "$PROJECT_DIR"

            git fetch origin
            git reset --hard origin/main

            cd backend

            mvn clean package -DskipTests

            pkill -f "datastore-0.0.7.jar" || true

            nohup java -jar target/datastore-0.0.7.jar > backend.log 2>&1 &

            sleep 20

            ps -ef | grep datastore | grep -v grep || true

            ss -tulnp | grep 8084 || true

            EOF
