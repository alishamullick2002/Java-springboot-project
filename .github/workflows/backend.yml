name: Java Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -f backend/pom.xml clean package -DskipTests

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: root
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            PROJECT_DIR=/root/Java-springboot-project

            cd $PROJECT_DIR

            echo "Updating repository..."
            git fetch origin
            git reset --hard origin/main

            cd backend

            echo "Building application..."
            mvn clean package -DskipTests

            echo "Stopping existing application..."
            pkill -f "datastore-0.0.7.jar" || true

            sleep 5

            echo "Starting application..."
            nohup java -jar target/datastore-0.0.7.jar > backend.log 2>&1 &

            sleep 20

            echo "Checking Java process..."
            ps -ef | grep datastore | grep -v grep || true

            echo "Checking listening port..."
            ss -tulnp | grep 8084 || true

            echo "Deployment completed successfully."
