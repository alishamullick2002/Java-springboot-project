name: Java Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -f backend/pom.xml clean package -DskipTests

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user

            if [ ! -d "Java-springboot-project" ]; then
              git clone https://github.com/alishamullick2002/Java-springboot-project.git
            fi

            cd Java-springboot-project

            git fetch origin
            git reset --hard origin/main

            cd backend

            mvn clean package -DskipTests

            if systemctl list-unit-files | grep -q datastore-backend.service; then
              sudo systemctl restart datastore-backend
              sudo systemctl status datastore-backend --no-pager
            else
              echo "datastore-backend.service not found. Build completed successfully."
            fi
