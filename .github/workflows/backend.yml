name: Java Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -f backend/pom.xml clean package -DskipTests

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "===== Updating Repository ====="

            if [ ! -d "/root/Java-springboot-project/.git" ]; then
              sudo git clone https://github.com/alishamullick2002/Java-springboot-project.git /root/Java-springboot-project
            fi

            cd /root/Java-springboot-project

            sudo git fetch origin
            sudo git reset --hard origin/main

            echo "===== Building Backend ====="

            cd backend

            sudo mvn clean package -DskipTests

            echo "===== Stopping Existing Application ====="

            sudo pkill -f "datastore-0.0.7.jar" || true

            sleep 5

            echo "===== Starting Spring Boot Application ====="

            sudo nohup java -jar target/datastore-0.0.7.jar > /root/Java-springboot-project/backend/backend.log 2>&1 &

            sleep 20

            echo "===== Running Java Process ====="
            ps -ef | grep datastore | grep -v grep || true

            echo "===== Listening Ports ====="
            sudo ss -tulnp | grep 8084 || true

            echo "===== Deployment Completed ====="
