name: Backend to EC2

on:
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Prepare EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            sudo yum install -y git maven java-21-amazon-corretto

      - name: Clone or Update Repository
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            APP_DIR=/home/ec2-user/app
            REPO_NAME=Java-springboot-project
            REPO_URL=https://github.com/alishamullick2002/Java-springboot-project.git

            mkdir -p $APP_DIR
            cd $APP_DIR

            if [ -d "$REPO_NAME/.git" ]; then
              cd $REPO_NAME
              git reset --hard
              git pull origin main
            else
              git clone $REPO_URL
              cd $REPO_NAME
            fi

      - name: Build Maven Project
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ec2-user/app/Java-springboot-project/backend
            mvn clean package -DskipTests

      - name: Deploy Application
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            LOG_DIR=/var/log/app
            sudo mkdir -p $LOG_DIR
            sudo chown ec2-user:ec2-user $LOG_DIR

            # Stop previous application
            pkill -f datastore-0.0.7.jar || true
            sleep 5

            cd /home/ec2-user/app/Java-springboot-project/backend/target

            nohup env \
              MYSQL_HOST="${{ secrets.DB_HOST }}" \
              MYSQL_USERNAME="${{ secrets.DB_USERNAME }}" \
              MYSQL_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              LOG_FILE_PATH="$LOG_DIR/datastore.log" \
              java -jar datastore-0.0.7.jar --server.port=8084 \
              > "$LOG_DIR/nohup.out" 2>&1 &

            sleep 30

            echo "Running Java Process:"
            ps -ef | grep datastore || true

            echo "Application Health Check:"
            curl -f http://localhost:8084/actuator/health

      - name: Show Application Logs
        if: always()
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "===== Last 100 lines of nohup.out ====="
            tail -100 /var/log/app/nohup.out || true
