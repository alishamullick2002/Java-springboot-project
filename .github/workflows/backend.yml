name: Backend to EC2

on:
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build Project
        run: |
          cd backend
          mvn clean package -DskipTests

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          command_timeout: 20m
          script: |
            set -e

            APP_DIR=/home/ec2-user/app
            REPO_NAME=Java-springboot-project

            cd $APP_DIR/$REPO_NAME/backend

            echo "Building application..."
            mvn clean package -DskipTests

            echo "Stopping old application..."

            PID=$(pgrep -f datastore-0.0.7.jar || true)

            if [ -n "$PID" ]; then
              kill "$PID"
              sleep 5
            fi

            sudo mkdir -p /var/log/app
            sudo chown ec2-user:ec2-user /var/log/app

            echo "Starting application..."

            nohup env \
              MYSQL_HOST="${{ secrets.DB_HOST }}" \
              MYSQL_USERNAME="${{ secrets.DB_USERNAME }}" \
              MYSQL_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              LOG_FILE_PATH=/var/log/app/datastore.log \
              java -jar target/datastore-0.0.7.jar --server.port=8084 \
              >/var/log/app/nohup.out 2>&1 < /dev/null &

            disown

            echo "Waiting for application..."
            sleep 20

            echo "Running Java process:"
            ps -ef | grep datastore | grep -v grep

            echo "Health Check:"
            curl -f http://localhost:8084/actuator/health
