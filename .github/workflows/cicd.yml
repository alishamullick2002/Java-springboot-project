name: Build, Push to ECR and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  REPO_NAME: ${{ github.event.repository.name }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set ECR Repository Names
        run: |
          echo "BACKEND_REPO=${REPO_NAME}-backend" >> $GITHUB_ENV
          echo "FRONTEND_REPO=${REPO_NAME}-frontend" >> $GITHUB_ENV

      - name: Create Backend ECR Repository
        run: |
          aws ecr describe-repositories \
            --repository-names $BACKEND_REPO \
            --region $AWS_REGION >/dev/null 2>&1 || \
          aws ecr create-repository \
            --repository-name $BACKEND_REPO \
            --image-scanning-configuration scanOnPush=true \
            --region $AWS_REGION

      - name: Create Frontend ECR Repository
        run: |
          aws ecr describe-repositories \
            --repository-names $FRONTEND_REPO \
            --region $AWS_REGION >/dev/null 2>&1 || \
          aws ecr create-repository \
            --repository-name $FRONTEND_REPO \
            --image-scanning-configuration scanOnPush=true \
            --region $AWS_REGION

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Backend Image
        run: |
          docker build -t backend ./backend

      - name: Tag Backend Image
        run: |
          docker tag backend:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_REPO:latest

      - name: Push Backend Image
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_REPO:latest

      - name: Build Frontend Image
        run: |
          docker build -t frontend ./frontend

      - name: Tag Frontend Image
        run: |
          docker tag frontend:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_REPO:latest

      - name: Push Frontend Image
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_REPO:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
            sudo docker login \
              --username AWS \
              --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            sudo docker pull \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ github.event.repository.name }}-backend:latest

            sudo docker pull \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ github.event.repository.name }}-frontend:latest

            sudo docker stop backend || true
            sudo docker rm backend || true

            sudo docker stop frontend || true
            sudo docker rm frontend || true

            sudo docker run -d \
              --name backend \
              --restart unless-stopped \
              -p 8084:8084 \
              -e SPRING_DATASOURCE_URL="${{ secrets.DB_URL }}" \
              -e SPRING_DATASOURCE_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e SPRING_DATASOURCE_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ github.event.repository.name }}-backend:latest

            sudo docker run -d \
              --name frontend \
              --restart unless-stopped \
              -p 8501:8501 \
              -e API_URL="http://<EC2_PUBLIC_IP>:8084" \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ github.event.repository.name }}-frontend:latest

            sudo docker ps
