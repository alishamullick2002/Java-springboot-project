name: Build Push ECR and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create Backend ECR Repository
        run: |
          if aws ecr describe-repositories \
            --repository-names backend \
            --region $AWS_REGION >/dev/null 2>&1; then
            echo "Backend repository already exists."
          else
            aws ecr create-repository \
              --repository-name backend \
              --image-scanning-configuration scanOnPush=true \
              --region $AWS_REGION
          fi

      - name: Create Frontend ECR Repository
        run: |
          if aws ecr describe-repositories \
            --repository-names frontend \
            --region $AWS_REGION >/dev/null 2>&1; then
            echo "Frontend repository already exists."
          else
            aws ecr create-repository \
              --repository-name frontend \
              --image-scanning-configuration scanOnPush=true \
              --region $AWS_REGION
          fi

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      ##################################################
      # BUILD & PUSH BACKEND
      ##################################################

      - name: Build Backend Image
        run: docker build -t backend:latest ./backend

      - name: Tag Backend Image
        run: |
          docker tag backend:latest \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/backend:latest

      - name: Push Backend Image
        run: |
          docker push \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/backend:latest

      ##################################################
      # BUILD & PUSH FRONTEND
      ##################################################

      - name: Build Frontend Image
        run: docker build -t frontend:latest ./frontend

      - name: Tag Frontend Image
        run: |
          docker tag frontend:latest \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/frontend:latest

      - name: Push Frontend Image
        run: |
          docker push \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/frontend:latest

      ##################################################
      # DEPLOY TO EC2
      ##################################################

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "Logging into Amazon ECR..."

            aws ecr get-login-password \
              --region ${{ secrets.AWS_REGION }} | \
            sudo docker login \
              --username AWS \
              --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

            echo "Pulling latest images..."

            sudo docker pull \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/backend:latest

            sudo docker pull \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/frontend:latest

            echo "Stopping old containers..."

            sudo docker stop backend || true
            sudo docker rm backend || true

            sudo docker stop frontend || true
            sudo docker rm frontend || true

            echo "Starting Backend Container..."

            sudo docker run -d \
              --name backend \
              --restart unless-stopped \
              -p 8084:8084 \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/backend:latest

            echo "Starting Frontend Container..."

            sudo docker run -d \
              --name frontend \
              --restart unless-stopped \
              -p 80:80 \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/frontend:latest

            echo "Removing unused images..."

            sudo docker image prune -af

            echo "Deployment completed successfully."

            echo "Running Containers:"
            sudo docker ps
