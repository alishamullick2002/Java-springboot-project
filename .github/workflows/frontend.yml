name: Deploy Streamlit Frontend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            APP_DIR=/home/ec2-user/front
            REPO_NAME=Java-springboot-project
            REPO_URL=https://github.com/alishamullick2002/Java-springboot-project.git

            mkdir -p $APP_DIR
            cd $APP_DIR

            if [ -d "$REPO_NAME/.git" ]; then
              cd $REPO_NAME
              git fetch origin
              git reset --hard origin/main
            else
              git clone $REPO_URL
              cd $REPO_NAME
            fi

            sudo dnf install -y python3 python3-pip

            cd frontend

            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            source venv/bin/activate

            pip install --upgrade pip
            pip install -r requirements.txt

            sudo systemctl daemon-reload
            sudo systemctl restart frontend
            sudo systemctl status frontend --no-pager
